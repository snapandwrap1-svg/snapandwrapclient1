<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="UTF-8">
  <title>Progress Gift Center Magic Frame</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;font-family:'DM Sans',sans-serif}
    a-scene{position:fixed!important;top:0;left:0;width:100%!important;height:100%!important}
    
    #loading, #start-screen, #err {
      position:fixed;inset:0;z-index:9999;background:#07070f;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:2rem;transition:opacity .5s
    }
    #loading.hide{opacity:0;pointer-events:none}
    
    #start-screen { display:none; z-index:10000; }
    #start-btn {
      padding:16px 36px; border-radius:30px; border:none; margin-top:20px;
      background:linear-gradient(135deg,#7c5cfc,#fc5c7d); color:#fff;
      font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700;
      cursor:pointer; box-shadow:0 6px 24px rgba(124,92,252,.4);
      animation: pulseBtn 2s infinite;
    }
    @keyframes pulseBtn{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

    .brand{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;
      background:linear-gradient(135deg,#7c5cfc,#fc5c7d);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
    .tag{font-size:0.78rem;color:#6b6b82;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2rem}
    .spin{width:44px;height:44px;border:3px solid #22223a;border-top-color:#7c5cfc;
      border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 1rem}
    @keyframes sp{to{transform:rotate(360deg)}}
    #load-txt{font-size:0.85rem;color:#6b6b82}
    
    #err{display:none;color:#f0f0f8;z-index:10001;}
    #err.show{display:flex}
    #err-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:8px}
    #err-msg{font-size:0.88rem;color:#6b6b82;line-height:1.7;max-width:300px}

    #brand-corner{
      position:fixed;top:1rem;left:1rem;z-index:100;
      font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;
      background:linear-gradient(135deg,#7c5cfc,#fc5c7d);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      display:none;pointer-events:none
    }
    #hint{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      padding:2rem 1.5rem;text-align:center;
      background:linear-gradient(transparent,rgba(0,0,0,.8));
      display:none;pointer-events:none; transition:opacity 0.3s;
    }
    .pulse{width:54px;height:54px;border:2px solid rgba(124,92,252,.7);
      border-radius:50%;margin:0 auto 12px;animation:pulse 1.6s ease-out infinite}
    @keyframes pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.7);opacity:0}}
    .h1{font-size:0.9rem;color:rgba(255,255,255,.85);font-weight:500;margin-bottom:4px}
    .h2{font-size:0.75rem;color:rgba(255,255,255,.45)}
    #banner{
      position:fixed;top:1rem;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,#7c5cfc,#fc5c7d);
      padding:8px 22px;border-radius:30px;font-size:0.82rem;
      font-weight:600;z-index:100;display:none;color:#fff;
      white-space:nowrap;box-shadow:0 4px 24px rgba(124,92,252,.5)
    }
  </style>

  <script>
    AFRAME.registerComponent('video-cover', {
      init: function() {
        this.el.addEventListener('materialtextureloaded', e => {
          const tex = e.detail.texture;
          const vid = e.detail.src;
          const updateUV = () => {
            const planeW = parseFloat(this.el.getAttribute('width')) || 1;
            const planeH = parseFloat(this.el.getAttribute('height')) || 1;
            const planeAspect = planeW / planeH;
            const videoAspect = vid.videoWidth / vid.videoHeight;

            if (videoAspect > planeAspect) {
              const repeatX = planeAspect / videoAspect;
              tex.repeat.set(repeatX, 1);
              tex.offset.set((1 - repeatX) / 2, 0);
            } else {
              const repeatY = videoAspect / planeAspect;
              tex.repeat.set(1, repeatY);
              tex.offset.set(0, (1 - repeatY) / 2);
            }
          };
          if (vid.videoWidth > 0) updateUV();
          else vid.addEventListener('loadedmetadata', updateUV);
        });
      }
    });
  </script>
</head>
<body>

<div id="loading">
  <div class="brand">Progress Gift Center</div>
  <div class="tag">Magic Video Frame</div>
  <div class="spin"></div>
  <div id="load-txt">Loading your magic frame...</div>
</div>

<div id="start-screen">
  <div class="brand">Progress Gift Center</div>
  <div class="tag">Ready to Experience</div>
  <div style="color:#6b6b82; font-size: 0.9rem; margin-bottom:10px;">Turn your volume up!</div>
  <button id="start-btn">Tap to Start AR ✨</button>
</div>

<div id="err">
  <div style="font-size:3rem;margin-bottom:1rem">😕</div>
  <div id="err-title">Something went wrong</div>
  <div id="err-msg">Please try again.</div>
</div>

<div id="brand-corner">Progress Gift Center ✨</div>
<div id="banner">✨ Frame detected!</div>
<div id="hint">
  <div class="pulse"></div>
  <div class="h1">Point camera at your photo frame</div>
  <div class="h2">Keep frame fully visible • Hold steady</div>
</div>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const orderId = params.get('order');

const globalVideo = document.createElement('video');
globalVideo.id = 'snap-video';
globalVideo.setAttribute('playsinline', '');
globalVideo.setAttribute('webkit-playsinline', '');
globalVideo.setAttribute('crossorigin', 'anonymous');
globalVideo.loop = true;

let targetPlaneHeight = 1;
let mindURLStr = "";

function setTxt(t) { document.getElementById('load-txt').textContent = t; }
function showErr(title, msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('err').classList.add('show');
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
}

function b64ToBlob(b64, mime) {
  const raw = b64.includes(',') ? b64.split(',')[1] : b64;
  const bin = atob(raw);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return new Blob([buf], { type: mime });
}

async function init() {
  if(!orderId) { showErr('Invalid Link', 'No order ID found. Use the QR code from Progress Gift Center.'); return; }
  setTxt('Finding your order...');
  
  try {
    const snap = await db.ref('orders/' + orderId).get();
    if(!snap.exists()) { showErr('Order Not Found', 'Order "' + orderId + '" not found. Contact Progress Gift Center.'); return; }
    
    const data = snap.val();
    db.ref('orders/' + orderId + '/scanCount').transaction(c => (c || 0) + 1);
    
    if(!data.mindFileData) { showErr('AR Not Ready', 'AR tracker missing. Contact Progress Gift Center.'); return; }
    if(!data.videoURL) { showErr('Video Missing', 'Video not found. Contact Progress Gift Center.'); return; }

    globalVideo.src = data.videoURL;
    globalVideo.load();

    setTxt('Preparing AR assets...');
    const mindBlob = b64ToBlob(data.mindFileData, 'application/octet-stream');
    mindURLStr = URL.createObjectURL(mindBlob);

    if (data.frameURL) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        targetPlaneHeight = img.height / img.width;
        showStartScreen();
      };
      img.onerror = () => { showStartScreen(); };
      img.src = data.frameURL;
    } else {
      showStartScreen();
    }
  } catch(e) {
    showErr('Error', e.message); console.error(e);
  }
}

function showStartScreen() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  setTxt('Starting camera...');

  globalVideo.muted = false;
  globalVideo.play().then(() => {
    globalVideo.pause();
    buildScene();
  }).catch(e => {
    buildScene();
  });
});

function buildScene() {
  const scene = document.createElement('a-scene');
  scene.id = 'ar-scene';
  scene.setAttribute('mindar-image', 'imageTargetSrc:' + mindURLStr + '; autoStart:true; uiLoading:no; uiError:no; uiScanning:no;');
  scene.setAttribute('color-space', 'sRGB');
  scene.setAttribute('renderer', 'colorManagement:true; physicallyCorrectLights:true;');
  scene.setAttribute('vr-mode-ui', 'enabled:false');
  scene.setAttribute('device-orientation-permission-ui', 'enabled:false');

  const assets = document.createElement('a-assets');
  assets.appendChild(globalVideo);
  scene.appendChild(assets);

  const camera = document.createElement('a-camera');
  camera.setAttribute('position', '0 0 0');
  camera.setAttribute('look-controls', 'enabled: false');
  scene.appendChild(camera);

  const targetEntity = document.createElement('a-entity');
  targetEntity.setAttribute('mindar-image-target', 'targetIndex: 0');
  
  const plane = document.createElement('a-plane');
  plane.setAttribute('position', '0 0 0.001');
  plane.setAttribute('width', '1');
  plane.setAttribute('height', targetPlaneHeight.toString());
  plane.setAttribute('material', 'src: #snap-video; shader: flat; transparent: true');
  plane.setAttribute('video-cover', '');

  targetEntity.appendChild(plane);
  scene.appendChild(targetEntity);

  document.body.appendChild(scene);

  scene.addEventListener('arReady', () => {
    document.getElementById('loading').classList.add('hide');
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('brand-corner').style.display = 'block';
      document.getElementById('hint').style.display = 'block';
    }, 500);
  });

  scene.addEventListener('targetFound', () => {
    document.getElementById('hint').style.opacity = '0';
    const b = document.getElementById('banner');
    b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 2500);
    globalVideo.play().catch(e => console.log('Play error:', e));
  });

  scene.addEventListener('targetLost', () => {
    document.getElementById('hint').style.opacity = '1';
    globalVideo.pause();
  });
}

init();
</script>
</body>
</html>
